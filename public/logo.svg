<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Gradient chính cho biểu tượng -->
    <linearGradient id="primary-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003ec7" />
      <stop offset="50%" stop-color="#0052ff" />
      <stop offset="100%" stop-color="#00c1fd" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#00c1fd" />
    </linearGradient>
    <!-- Bộ lọc phát sáng (Glow filter) -->
    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1" />
      <feGaussianBlur stdDeviation="3" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Group chính căn giữa -->
  <g transform="translate(10, 10)">
    <!-- Vòng tròn quỹ đạo công nghệ phát sáng phía sau -->
    <ellipse cx="90" cy="90" rx="75" ry="30" fill="none" stroke="url(#accent-grad)" stroke-width="2" stroke-dasharray="5 15" transform="rotate(-30 90 90)" opacity="0.7" filter="url(#glow-subtle)"/>
    <ellipse cx="90" cy="90" rx="75" ry="30" fill="none" stroke="url(#primary-grad)" stroke-width="3" transform="rotate(30 90 90)" opacity="0.8" filter="url(#glow-subtle)"/>

    <!-- Lục giác hóa học ngoài cùng -->
    <polygon points="90,15 155,52 155,128 90,165 25,128 25,52" fill="none" stroke="url(#primary-grad)" stroke-width="5" stroke-linejoin="round" filter="url(#glow-subtle)"/>
    
    <!-- Các node nguyên tử ở góc lục giác -->
    <circle cx="90" cy="15" r="6" fill="#00c1fd" filter="url(#glow-subtle)"/>
    <circle cx="155" cy="52" r="6" fill="#0052ff" />
    <circle cx="155" cy="128" r="6" fill="#10b981" filter="url(#glow-subtle)"/>
    <circle cx="90" cy="165" r="6" fill="#00c1fd" />
    <circle cx="25" cy="128" r="6" fill="#0052ff" />
    <circle cx="25" cy="52" r="6" fill="#10b981" filter="url(#glow-subtle)"/>

    <!-- Biểu tượng chữ H cách điệu & DNA xoắn kép ở trung tâm -->
    <!-- Cột trái của chữ H -->
    <path d="M 60,55 L 60,125" stroke="url(#primary-grad)" stroke-width="12" stroke-linecap="round" filter="url(#glow-subtle)"/>
    <!-- Cột phải của chữ H -->
    <path d="M 120,55 L 120,125" stroke="url(#primary-grad)" stroke-width="12" stroke-linecap="round" filter="url(#glow-subtle)"/>
    
    <!-- Cầu nối ngang chữ H cách điệu thành chuỗi DNA xoắn -->
    <path d="M 60,75 C 80,60 100,100 120,85" fill="none" stroke="url(#accent-grad)" stroke-width="5" stroke-linecap="round" filter="url(#glow-subtle)"/>
    <path d="M 60,105 C 80,120 100,80 120,95" fill="none" stroke="url(#primary-grad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 3" opacity="0.9"/>

    <!-- Các liên kết node nơ-ron bên trong -->
    <line x1="60" y1="90" x2="120" y2="90" stroke="#00c1fd" stroke-width="2" stroke-dasharray="4 4" />
    
    <circle cx="90" cy="90" r="8" fill="#10b981" filter="url(#glow-heavy)"/>
    <circle cx="75" cy="80" r="5" fill="#00c1fd" />
    <circle cx="105" cy="100" r="5" fill="#0052ff" />
  </g>
</svg>
